# Render blueprint — free-tier deployment in replay mode.
# Judges see a recorded live World Cup match run through the real pipeline;
# every Merkle proof still verifies against the permanent on-chain roots.
services:
  - type: web
    name: edgeproof
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npx tsx src/agent/run.ts
    envVars:
      # Live mode while World Cup matches are still on. To switch the judges'
      # replay demo back on, restore:
      #   - key: REPLAY_FILE
      #     value: data/replay-worldcup.jsonl.gz
      #   - key: REPLAY_SPEED
      #     value: "120"
      # LEDGER_FILE unset in live mode: the service journals onto the shipped
      # data/ledger.jsonl, so recorded live history (and its P&L) is visible.
      # When switching back to replay, set LEDGER_FILE=/tmp/ledger-replay.jsonl
      # again so replay decisions don't mix into the recorded history.
      - key: TXLINE_API_TOKEN
        sync: false # set in the Render dashboard
      - key: BURNER_WALLET_JSON
        sync: false # devnet burner keypair JSON array — set in the Render dashboard
